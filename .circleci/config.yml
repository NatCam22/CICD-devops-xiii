version: 2.1

executors:
  python:
    docker:
      - image: cimg/python:3.11

jobs:
  setup:
    executor: python
    steps:
      - checkout
      - run:
        name: Install dependencies
        command: pip install -r requirements.txt
      - persist_to_workspace:
          root: .
          paths:
            - .
  test:
    executor: python
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run tests with coverage
          command: python3 -m pytest tests/ -v --cov=app --cov-report=xml
      - store_artifacts:
          path: coverage.xml
  lint:
    executor: python
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Run linting
          command: flake8 app/ tests/

workflows:
  pipeline:
    jobs:
      - setup
      - test:
          requires:
            - setup
      - lint:
          requires:
            - setup