version: 2.1

jobs:
  test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r requirements.txt
      - run:
          name: Run tests with coverage
          command: python3 -m pytest tests/ -v --cov=app --cov-report=xml
      - store_artifacts:
          path: coverage.xml

workflows:
  pipeline:
    jobs:
      - test